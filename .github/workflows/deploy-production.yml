name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend to production
    runs-on: self-hosted
    environment: production

    steps:
      - name: Validate production workspace
        run: |
          set -euo pipefail

          if [ ! -d /opt/cloudm/backend/.git ]; then
            echo "Missing backend repository at /opt/cloudm/backend" >&2
            exit 1
          fi

          if [ ! -f /opt/cloudm/backend/.env.production ]; then
            echo "Missing production env file at /opt/cloudm/backend/.env.production" >&2
            exit 1
          fi

      - name: Deploy on self-hosted runner
        run: |
          set -euo pipefail
          cd /opt/cloudm/backend
          git config --global --add safe.directory /opt/cloudm/backend
          git restore --source=HEAD --staged --worktree -- scripts/deploy-production.sh
          git fetch origin main
          temp_script="$(mktemp)"
          trap 'rm -f "${temp_script}"' EXIT
          git show origin/main:scripts/deploy-production.sh | tr -d '\r' > "${temp_script}"
          chmod +x "${temp_script}"
          PROJECT_DIR=/opt/cloudm/backend DEPLOY_BRANCH=main bash "${temp_script}"
